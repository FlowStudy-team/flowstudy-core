spring.datasource.url=jdbc:h2:mem:flowstudy;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.mode=always
mybatis.configuration.map-underscore-to-camel-case=true
auth.jwt.secret=flowstudy-test-secret-that-is-at-least-thirty-two-bytes
auth.jwt.expire-seconds=7200
flowstudy.judge.rabbitmq.queue-name=submission_queue
