spring.application.name=flowstudy-core

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/flowstudy?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:flowstudy}
spring.datasource.password=${DB_PASSWORD:flowstudy_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
mybatis.configuration.map-underscore-to-camel-case=true

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:flowstudy}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:flowstudy_pass}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

auth.jwt.secret=${JWT_SECRET:flowstudy-local-development-secret-change-me-2026}
auth.jwt.expire-seconds=${JWT_EXPIRE_SECONDS:7200}

flowstudy.judge.rabbitmq.queue-name=${JUDGE_SUBMISSION_QUEUE:submission_queue}
