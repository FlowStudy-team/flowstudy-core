spring.application.name=flowstudy-core

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/flowstudy?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
mybatis.configuration.map-underscore-to-camel-case=true

auth.jwt.secret=${JWT_SECRET:flowstudy-local-development-secret-change-me-2026}
auth.jwt.expire-seconds=${JWT_EXPIRE_SECONDS:7200}
